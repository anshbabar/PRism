name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (lint, types, tests, eval smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Type-check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest

      - name: Eval smoke test (mock provider)
        run: make eval
        env:
          LLM_PROVIDER: mock

  frontend:
    name: Frontend (typecheck, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests (vitest)
        run: npm run test
